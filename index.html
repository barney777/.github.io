<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MQTT 測試</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body style="padding:20px; font-family:sans-serif;">
    <h2>MQTT 傳送器 (Web)</h2>
    <div id="status" style="color:red;">連線中...</div>
    <input type="text" id="msg" value="Hello APP!" style="width:200px; padding:10px; margin:10px 0;">
    <br>
    <button onclick="send()" style="padding:10px 20px; background:#007bff; color:white; border:none; border-radius:4px;">發送訊息</button>
    <div id="log" style="margin-top:20px; font-size:12px; color:#666;"></div>

    <script>
        const log = (m) => document.getElementById('log').innerHTML += m + '<br>';
        // 使用更穩定的伺服器與路徑
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

        client.on('connect', () => {
            document.getElementById('status').innerText = '✅ 已連線 (EMQX)';
            document.getElementById('status').style.color = 'green';
            log('連線成功');
        });

        function send() {
            const m = document.getElementById('msg').value;
            client.publish('test/device/1', m);
            log('已發送: ' + m);
        }
    </script>
</body>
</html>
