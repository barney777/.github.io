<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT 網頁傳送測試</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 500px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        #status { font-weight: bold; padding: 5px; border-radius: 4px; }
        .status-off { background: #fee; color: #c00; }
        .status-on { background: #efe; color: #080; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:disabled { background: #ccc; }
        #log { font-family: monospace; background: #f4f4f4; padding: 10px; height: 150px; overflow-y: auto; font-size: 12px; margin-top: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>MQTT 傳送器 (Web)</h2>
    
    <div>目前狀態：<span id="status" class="status-off">連線中...</span></div>
    
    <hr>
    
    <label for="topic">主題 (Topic):</label>
    <input type="text" id="topic" value="test/device/1" placeholder="例如: home/garden/light">
    
    <label for="message">訊息 (Message):</label>
    <input type="text" id="message" value="Hello APP!" placeholder="輸入要傳送的內容">
    
    <button id="sendBtn" onclick="sendMessage()" disabled>發送訊息</button>

    <div id="log">系統日誌：<br></div>
</div>

<script>
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const sendBtn = document.getElementById('sendBtn');

    // 輔助函式：顯示日誌
    function addLog(msg) {
        logEl.innerHTML += `> ${msg}<br>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    // --- MQTT 連線設定 ---
    // 使用 EMQX 公共伺服器 (Websocket 加密埠 8084)
    const brokerUrl = 'wss://broker.emqx.io:8084/mqtt'; 
    
    const options = {
        clientId: 'web_client_' + Math.random().toString(16).substring(2, 10),
        clean: true,
        connectTimeout: 4000,
        reconnectPeriod: 2000,
    };

    addLog('正在嘗試連線至 Broker...');
    const client = mqtt.connect(brokerUrl, options);

    // --- 事件監聽 ---
    client.on('connect', () => {
        addLog('✅ 連線成功！');
        statusEl.innerText = '已連線';
        statusEl.className = 'status-on';
        sendBtn.disabled = false;
    });

    client.on('reconnect', () => {
        addLog('⚠️ 正在嘗試重新連線...');
        statusEl.innerText = '重連中';
        statusEl.className = 'status-off';
        sendBtn.disabled = true;
    });

    client.on('error', (err) => {
        addLog('❌ 連線錯誤: ' + err.message);
        console.error('MQTT Error:', err);
    });

    client.on('close', () => {
        addLog('🔌 連線已中斷');
    });

    // --- 傳送邏輯 ---
    function sendMessage() {
        const topic = document.getElementById('topic').value;
        const message = document.getElementById('message').value;

        if (client.connected) {
            client.publish(topic, message, { qos: 1 }, (err) => {
                if (err) {
                    addLog('❌ 發送失敗: ' + err);
                } else {
                    addLog(`🚀 成功發送至 [${topic}]: ${message}`);
                }
            });
        } else {
            addLog('❌ 無法發送：尚未建立連線');
        }
    }
</script>

</body>
</html>
